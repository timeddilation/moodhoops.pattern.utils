server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;  # Change this to your domain or EC2 public IP

    client_max_body_size 20M;  # Allow larger file uploads for BMP files

    # Logging
    access_log /var/log/nginx/moodhoops-access.log;
    error_log /var/log/nginx/moodhoops-error.log;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (for Dash callbacks)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Static files caching (if needed)
    location /assets/ {
        proxy_pass http://127.0.0.1:8000/assets/;
        proxy_cache_valid 200 1h;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }
}
